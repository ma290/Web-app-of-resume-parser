<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Clinic Chat Widget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Floating Button ── */
#clinic-chat-btn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(37,99,235,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: transform 0.3s, box-shadow 0.3s;
  animation: bounce-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
#clinic-chat-btn:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(37,99,235,0.6); }
#clinic-chat-btn svg { width: 28px; height: 28px; fill: white; }
#clinic-chat-btn .close-icon { display: none; }
#clinic-chat-btn.open .chat-icon { display: none; }
#clinic-chat-btn.open .close-icon { display: block; }

.notif-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 12px; height: 12px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid white;
  animation: pulse 2s infinite;
}

@keyframes bounce-in {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ── Chat Window ── */
#clinic-chat-window {
  position: fixed;
  bottom: 100px;
  right: 28px;
  width: 360px;
  height: 520px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  display: none;
  flex-direction: column;
  z-index: 99998;
  overflow: hidden;
  animation: slide-up 0.3s cubic-bezier(0.34,1.56,0.64,1);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#clinic-chat-window.open { display: flex; }

@keyframes slide-up {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* Header */
.chat-header {
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-avatar {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.chat-header-info { flex: 1; }
.chat-clinic-name { color: white; font-weight: 700; font-size: 0.95rem; }
.chat-status { color: rgba(255,255,255,0.8); font-size: 0.72rem; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #f8faff;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

.msg {
  display: flex;
  gap: 8px;
  animation: msg-in 0.2s ease;
}
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg.bot { align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg,#2563eb,#7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  flex-shrink: 0;
  color: white;
}

.msg-bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.85rem;
  line-height: 1.5;
  color: #1e293b;
}
.msg.bot  .msg-bubble { background: white; border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.msg.user .msg-bubble { background: linear-gradient(135deg,#2563eb,#7c3aed); color: white; border-radius: 16px 4px 16px 16px; }

/* Typing indicator */
.typing-indicator { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: white; border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); width: fit-content; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* Quick replies */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 16px 10px;
  background: #f8faff;
}
.quick-btn {
  background: white;
  border: 1.5px solid #e2e8f0;
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #2563eb;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-btn:hover { background: #2563eb; color: white; border-color: #2563eb; }

/* Input */
.chat-input-area {
  padding: 12px 16px;
  background: white;
  border-top: 1px solid #f1f5f9;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.85rem;
  outline: none;
  transition: border 0.2s;
  font-family: inherit;
  resize: none;
  height: 42px;
  color: #1e293b;
}
#chat-input:focus { border-color: #2563eb; }
#chat-input::placeholder { color: #94a3b8; }

#send-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg,#2563eb,#7c3aed);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, opacity 0.2s;
  flex-shrink: 0;
}
#send-btn:hover { transform: scale(1.05); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
#send-btn svg { width: 18px; height: 18px; fill: white; }

.powered {
  text-align: center;
  font-size: 0.65rem;
  color: #cbd5e1;
  padding: 6px;
  background: white;
}
</style>
</head>
<body>

<!-- Floating Button -->
<button id="clinic-chat-btn" onclick="toggleChat()">
  <span class="notif-dot"></span>
  <!-- Chat icon -->
  <svg class="chat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-3H6V7h12v2z"/></svg>
  <!-- Close icon -->
  <svg class="close-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- Chat Window -->
<div id="clinic-chat-window">
  <div class="chat-header">
    <div class="chat-avatar">🏥</div>
    <div class="chat-header-info">
      <div class="chat-clinic-name" id="clinic-display-name">Loading...</div>
      <div class="chat-status"><span class="status-dot"></span> AI Receptionist • Online 24/7</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="quick-replies" id="quick-replies">
    <button class="quick-btn" onclick="sendQuick('What are your timings?')">⏰ Timings</button>
    <button class="quick-btn" onclick="sendQuick('Which doctors are available?')">👨‍⚕️ Doctors</button>
    <button class="quick-btn" onclick="sendQuick('How to book an appointment?')">📅 Appointment</button>
    <button class="quick-btn" onclick="sendQuick('What services do you offer?')">💊 Services</button>
  </div>

  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Type your question..." onkeydown="handleKey(event)" />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered">Powered by ClinicAI</div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  // Replace this with your actual HF Space URL
  const API_BASE = "https://asyoucansee-mistral.hf.space";
  
  // Get clinic ID from script tag query param, default to 'demo'
  const CLINIC_ID = new URLSearchParams(document.currentScript?.src.split('?')[1] || '').get('id') || 'demo';

  // ── STATE ─────────────────────────────────────────────────────────────────
  let history = [];
  let isOpen = false;
  let clinicName = "Clinic";

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(`${API_BASE}/clinic/${CLINIC_ID}`);
      const data = await res.json();
      clinicName = data.clinic.name;
      document.getElementById('clinic-display-name').textContent = clinicName;
    } catch(e) {
      document.getElementById('clinic-display-name').textContent = "Clinic Assistant";
    }

    addMessage('bot', `Hello! 👋 I'm the AI receptionist for ${clinicName}. How can I help you today?`);
  }

  init();

  // ── TOGGLE ────────────────────────────────────────────────────────────────
  function toggleChat() {
    const btn = document.getElementById('clinic-chat-btn');
    const win = document.getElementById('clinic-chat-window');
    isOpen = !isOpen;
    btn.classList.toggle('open', isOpen);
    win.classList.toggle('open', isOpen);
    if (isOpen) {
      document.querySelector('.notif-dot').style.display = 'none';
      document.getElementById('chat-input').focus();
    }
  }

  // ── MESSAGES ──────────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'bot') {
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">${text}</div>`;
    } else {
      div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  // ── SEND ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    addMessage('user', msg);

    // Hide quick replies after first message
    document.getElementById('quick-replies').style.display = 'none';

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          clinic_id: CLINIC_ID,
          message: msg,
          history: history
        })
      });

      const data = await res.json();
      hideTyping();

      const reply = data.response || "Sorry, I couldn't understand that. Please call us directly.";
      addMessage('bot', reply);

      history.push({ role: 'patient', message: msg });
      history.push({ role: 'assistant', message: reply });

      // Keep history short
      if (history.length > 10) history = history.slice(-10);

    } catch(e) {
      hideTyping();
      addMessage('bot', "I'm having trouble connecting. Please call us directly for assistance.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>
</body>
</html>
